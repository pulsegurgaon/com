<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blogs</title>

<style>
body{
font-family:Arial;
margin:0;
background:#f4f4f6;
}

header{
padding:15px;
background:#e11d48;
color:white;
font-weight:bold;
display:flex;
justify-content:space-between;
}

.container{
padding:15px;
}

.card{
background:white;
padding:12px;
border-radius:10px;
margin-bottom:12px;
cursor:pointer;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
transition:0.2s;
}

.card:hover{
transform:scale(1.02);
}

.card img{
width:100%;
border-radius:8px;
margin-bottom:8px;
}

.title{
font-size:18px;
font-weight:bold;
margin-bottom:5px;
}

.preview{
color:#555;
font-size:14px;
}
</style>
</head>

<body>

<header>
<div>PulseGurgaon Blogs</div>
<button onclick="goHome()">Home</button>
</header>

<div class="container" id="blogList">
Loading blogs...
</div>

<script>

// FETCH BLOGS
fetch("/blogs")
.then(r=>r.json())
.then(data=>{

let html="";

data.forEach(b=>{
html+=`
<div class="card" onclick='openBlog(${JSON.stringify(b)})'>
<img src="${b.image}">
<div class="title">${b.title}</div>
<div class="preview">${b.content.slice(0,100)}...</div>
</div>
`;
});

document.getElementById("blogList").innerHTML=html;

});

// OPEN BLOG
function openBlog(blog){
localStorage.setItem("currentBlog", JSON.stringify(blog));
window.location.href="blog-view.html";
}

function goHome(){
window.location.href="/";
}

</script>

</body>
</html>
