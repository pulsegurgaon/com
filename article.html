<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Article</title>

<style>
body{margin:0;font-family:Arial;background:#f4f4f6}

.container{
max-width:1000px;
margin:auto;
padding:15px;
display:grid;
grid-template-columns:3fr 1fr;
gap:20px;
}

img{width:100%;border-radius:10px}

.summary{
background:#ffeeba;
padding:12px;
border-radius:8px;
margin:10px 0;
}

.article{
line-height:1.6;
}

.vocab{
background:white;
padding:10px;
border-radius:8px;
}

@media(max-width:768px){
.container{grid-template-columns:1fr}
}
</style>
</head>

<body>

<div class="container">

<div>
<img id="image">
<h1 id="title"></h1>

<div class="summary" id="summary"></div>

<div class="article" id="article"></div>
</div>

<div class="vocab">
<h3>📘 Vocabulary</h3>
<div id="vocab"></div>
</div>

</div>

<script>

const data = JSON.parse(localStorage.getItem("currentArticle"));

document.getElementById("image").src = data.image;
document.getElementById("title").innerText = data.title;
document.getElementById("summary").innerText = data.summary;
document.getElementById("article").innerText = data.article;

const vocabBox = document.getElementById("vocab");

if(data.vocab){
data.vocab.split("\n").forEach(v=>{
if(v.trim()){
const p=document.createElement("p");
p.innerText="• "+v;
vocabBox.appendChild(p);
}
});
}

</script>

</body>
</html>
