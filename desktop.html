<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PulseGurgaon</title>
<link rel="stylesheet" href="desktop.css">
</head>
<body>

<header>
  <div class="logo">PulseGurgaon</div>
  <nav>
    <a href="#" class="active">News</a>
    <a href="blogs.html">Blogs</a>
    <a href="blogs.html">Blogs</a>
  </nav>
  <div class="search-container">
    <input type="text" id="searchInput" placeholder="Search news...">
  </div>
  <div class="right-header">
    <button onclick="toggleLang()">EN / HI</button>
    <button onclick="location.href='admin.html'">ADMIN</button>
  </div>
</header>

<div class="breaking">
  <span id="ticker">🔥 Breaking News: Loading latest updates...</span>
</div>

<div class="top-tabs">
  <span onclick="filterCategory('All')" class="active">All</span>
  <span onclick="filterCategory('India')">India</span>
  <span onclick="filterCategory('World')">World</span>
  <span onclick="filterCategory('Technology')">Technology</span>
  <span onclick="filterCategory('Finance')">Finance</span>
  <span onclick="filterCategory('General')">General</span>
</div>

<div class="main-container">
  <!-- Left - Latest News -->
  <div class="latest-news">
    <h2>Latest News</h2>
    <div class="news-grid" id="newsGrid"></div>
  </div>

  <!-- Right Sidebar -->
  <div class="sidebar">
    <h3>Trending Blogs</h3>
    <div id="blogPreview"></div>

    <div class="ad-box">
      <strong>Boost Your Business</strong><br>
      Promote your products or services to thousands in Gurgaon.<br>
      <button>Advertise Now</button>
    </div>
  </div>
</div>

<script>
// Fetch articles.json
fetch("articles.json?v=" + Date.now())
  .then(r => r.json())
  .then(data => {
    const articles = data.articles || [];
    renderNews(articles);
    generateTicker(articles);
    renderTrendingBlogs();
  });

function renderNews(articles) {
  const grid = document.getElementById("newsGrid");
  grid.innerHTML = "";

  articles.slice(0, 20).forEach((a, i) => {
    if (i % 3 === 0 && i !== 0) {
      grid.innerHTML += `<div class="ad">ADVERTISEMENT • Boost Your Business with PulseGurgaon</div>`;
    }
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <img src="${a.image || 'https://picsum.photos/600/400'}">
      <div class="card-content">
        <span class="badge">${a.category || 'General'}</span>
        <h3>${a.title_en || 'No title'}</h3>
        <p>${(a.summary_points || []).join(" • ") || (a.article_en || '').substring(0, 140) + "..."}</p>
      </div>
    `;
    card.onclick = () => {
      localStorage.setItem("currentArticle", JSON.stringify(a));
      window.location.href = "article.html";
    };
    grid.appendChild(card);
  });
}

function generateTicker(articles) {
  const text = articles.slice(0, 8).map(a => a.title_en).join(" 🔥 ");
  document.getElementById("ticker").innerHTML = text;
}

function renderTrendingBlogs() {
  const container = document.getElementById("blogPreview");
  container.innerHTML = `
    <div class="blog-item">10 Mouth-Watering Street Foods You Must Try in Delhi</div>
    <div class="blog-item">Top 5 Weekend Getaways Near Gurgaon</div>
    <div class="blog-item">Sloch Market Today: Tips for Smart Investing</div>
    <div class="blog-item">A Look at Gurgaon's Rapidly Changing Skyline</div>
  `;
}

function filterCategory(cat) {
  alert("Filtered by " + cat);
}

function toggleLang() {
  alert("Language switched");
}
</script>

</body>
</html>
