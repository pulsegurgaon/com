<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PulseGurgaon</title>
<link rel="stylesheet" href="desktop.css">
</head>

<body>

<script>
if(window.innerWidth < 790){
window.location.href="/index.html";
}
</script>

<header>
PulseGurgaon
<input id="search" placeholder="Search news...">
</header>

<div class="layout">

<div class="main" id="news"></div>

<div class="sidebar">
<h3>Trending Blogs</h3>
<div id="blogs"></div>

<div class="side-ad" id="sideAd"></div>
</div>

</div>

<script>

let allNews=[];

fetch("/news").then(r=>r.json()).then(d=>{
allNews=d;
render(d);
});

fetch("/blogs").then(r=>r.json()).then(d=>{
let html="";
d.slice(0,6).forEach(b=>{
html+=`<div class="blog">${b.title}</div>`;
});
document.getElementById("blogs").innerHTML=html;
});

function render(data){
let html="";
data.forEach((n,i)=>{
html+=`
<div class="card" onclick="openArticle(${i})">
<img src="${n.image}">
<h3>${n.title_en}</h3>
</div>
`;

if(i===2){
html+=`<div class="ad-banner" id="banner"></div>`;
loadBanner();
}
});
document.getElementById("news").innerHTML=html;
}

function loadBanner(){
fetch("/ads").then(r=>r.json()).then(ad=>{
document.getElementById("banner").innerHTML=
`<img src="${ad.image}" onclick="window.open('${ad.link}')">`;
});
}

fetch("/ads").then(r=>r.json()).then(ad=>{
document.getElementById("sideAd").innerHTML=
`<img src="${ad.image}" onclick="window.open('${ad.link}')">`;
});

function openArticle(i){
localStorage.setItem("article",JSON.stringify(allNews[i]));
window.location="/article.html";
}

</script>

</body>
</html>
