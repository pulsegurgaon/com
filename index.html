<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PulseGurgaon</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<div>☰</div>
<div class="logo">PULSE GURGAON</div>
<div>👤</div>
</header>

<div class="ticker" id="ticker">Loading breaking news...</div>

<!-- MOBILE -->
<div id="mobile">

<div id="hero"></div>
<div class="newsList" id="newsList"></div>

</div>

<!-- DESKTOP -->
<div id="desktop" class="container" style="display:none;">

<div>
<h2>NEWS</h2>
<div class="grid" id="grid"></div>
</div>

<div class="sidebar">
<h3>Trending</h3>
<div id="blogs"></div>
</div>

</div>

<script>

// RESPONSIVE SWITCH
function checkScreen(){
if(window.innerWidth > 768){
document.getElementById("mobile").style.display="none";
document.getElementById("desktop").style.display="grid";
renderDesktop();
}else{
document.getElementById("mobile").style.display="block";
document.getElementById("desktop").style.display="none";
renderMobile();
}
}

window.onload=checkScreen;
window.onresize=checkScreen;

// DATA
let articles=[];

// FETCH NEWS
fetch("articles.json?v="+Date.now())
.then(r=>r.json())
.then(d=>{
articles=d.articles||[];
renderMobile();
});

// TICKER
fetch("/ticker")
.then(r=>r.json())
.then(d=>{
document.getElementById("ticker").innerText=d.text;
});

// SAFE
function safe(a){
return{
title:a.title_en||"No title",
summary:(a.summary_points||[]).join(" • "),
image:a.image||"https://picsum.photos/400"
}
}

// MOBILE RENDER
function renderMobile(){

if(!articles.length) return;

const first=safe(articles[0]);

document.getElementById("hero").innerHTML=`
<div class="hero">
<img src="${first.image}">
<div class="heroText">
<h1>🔴 LIVE ${first.title}</h1>
<p>${first.summary}</p>
</div>
</div>
`;

let html="";

articles.slice(1,15).forEach(a=>{
const d=safe(a);

html+=`
<div class="newsItem" onclick='openArticle(${JSON.stringify(a)})'>
<img src="${d.image}">
<div class="newsText">
<h3>${d.title}</h3>
<p>${d.summary}</p>
</div>
</div>
`;
});

document.getElementById("newsList").innerHTML=html;
}

// DESKTOP RENDER
function renderDesktop(){

let html="";

articles.slice(0,10).forEach(a=>{
const d=safe(a);

html+=`
<div class="card" onclick='openArticle(${JSON.stringify(a)})'>
<img src="${d.image}">
<h3>${d.title}</h3>
<p>${d.summary}</p>
</div>
`;
});

document.getElementById("grid").innerHTML=html;
}

// OPEN
function openArticle(a){
localStorage.setItem("currentArticle",JSON.stringify(a));
location.href="article.html";
}

</script>

</body>
</html>
