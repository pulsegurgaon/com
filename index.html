<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PulseGurgaon</title>

<style>
body{
font-family:Arial;
background:#f4f4f4;
margin:0;
}

header{
background:#111;
color:white;
padding:15px;
text-align:center;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.article{
background:white;
padding:15px;
margin-bottom:20px;
border-radius:8px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.article h2{
margin:0;
}

.date{
color:gray;
font-size:14px;
}

</style>
</head>

<body>

<header>
<h1>PulseGurgaon 📰</h1>
<p>AI Powered News</p>
</header>

<div class="container" id="news"></div>

<script>

fetch("articles.json")
.then(res => res.json())
.then(data => {

const container = document.getElementById("news")

data.articles.reverse().forEach(article => {

const div = document.createElement("div")
div.className="article"

div.innerHTML = `
<h2>${article.title}</h2>
<p class="date">${article.date}</p>
<p>${article.content}</p>
`

container.appendChild(div)

})

})

</script>

</body>
</html>
