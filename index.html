<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PulseGurgaon</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="logo">PulseGurgaon</div>
  <input id="searchInput" class="search" placeholder="Search news...">
  <div class="lang">EN / HI</div>
</header>

<div class="breaking">
  <span id="ticker">🔥 Loading breaking news...</span>
</div>

<div class="tabs">
  <span class="active" onclick="filterCategory('All')">All</span>
  <span onclick="filterCategory('India')">India</span>
  <span onclick="filterCategory('World')">World</span>
  <span onclick="filterCategory('Technology')">Technology</span>
  <span onclick="filterCategory('Finance')">Finance</span>
</div>

<!-- Hero -->
<div class="hero" id="heroSection"></div>

<!-- News Grid -->
<div class="news-grid" id="newsGrid"></div>

<!-- Bottom Navigation -->
<div class="bottom-nav">
  <div onclick="location.href='index.html'">🏠<br>Home</div>
  <div class="blog-btn" onclick="location.href='blogs.html'">BLOG</div>
  <div onclick="location.href='admin.html'">⚙️<br>Admin</div>
</div>

<script>
// Fetch news from articles.json
fetch("articles.json?v=" + Date.now())
  .then(r => r.json())
  .then(data => {
    const articles = data.articles || [];
    renderHero(articles);
    renderNewsGrid(articles);
    generateTicker(articles);
  });

// Render Hero (first article)
function renderHero(articles) {
  if (articles.length === 0) return;
  const a = articles[0];

  document.getElementById("heroSection").innerHTML = `
    <img src="${a.image || 'https://picsum.photos/800/500'}" alt="">
    <div class="live-badge">● LIVE</div>
    <div class="headline">${a.title_en || 'No title'}</div>
    <div class="summary">
      ${(a.summary_points || []).join(" • ") || (a.article_en || '').substring(0, 160) + "..."}
    </div>
  `;

  // Click hero to open article
  document.getElementById("heroSection").onclick = () => {
    localStorage.setItem("currentArticle", JSON.stringify(a));
    window.location.href = "article.html";
  };
}

// Render News Grid - After first 2 articles → ad, then after every 2 articles → ad
function renderNewsGrid(articles) {
  const grid = document.getElementById("newsGrid");
  grid.innerHTML = "";

  articles.slice(0, 20).forEach((a, i) => {
    // Ad pattern: after first 2, then after every 2 more
    if (i === 2 || (i > 2 && (i - 2) % 2 === 0)) {
      grid.innerHTML += `<div class="ad">ADVERTISEMENT • Boost Your Business with PulseGurgaon</div>`;
    }

    const card = document.createElement("div");
    card.className = "news-card";
    card.innerHTML = `
      <img src="${a.image || 'https://picsum.photos/600/400'}">
      <div class="cardText">
        <span class="badge">${a.category || 'General'}</span>
        <h3>${a.title_en || 'No title'}</h3>
        <p>${(a.summary_points || []).join(" • ") || (a.article_en || '').substring(0, 120) + "..."}</p>
      </div>
    `;
    card.onclick = () => {
      localStorage.setItem("currentArticle", JSON.stringify(a));
      window.location.href = "article.html";
    };
    grid.appendChild(card);
  });
}

// Ticker
function generateTicker(articles) {
  if (articles.length === 0) return;
  const text = articles.slice(0, 6).map(a => a.title_en || "Breaking").join("   🔥   ");
  document.getElementById("ticker").innerHTML = text;
}

// Simple filter
function filterCategory(cat) {
  alert("Filtered by " + cat);
}
</script>

</body>
</html>
