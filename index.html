<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PulseGurgaon</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="top">
☰ PulseGurgaon
<input id="search" placeholder="Search news...">
<button onclick="toggleLang()">EN/HI</button>
</div>

<div class="categories">
<span onclick="filter('All')">All</span>
<span onclick="filter('India')">India</span>
<span onclick="filter('World')">World</span>
<span onclick="filter('Technology')">Technology</span>
<span onclick="filter('Finance')">Finance</span>
</div>

<div class="ticker" id="ticker"></div>

<div id="news"></div>

<div class="bottom">
<div onclick="goHome()">🏠 Home</div>
<div class="active" onclick="goBlogs()">BLOG</div>
<div onclick="goAdmin()">⚙️ Admin</div>
</div>

<script>
if(window.innerWidth > 790){
window.location.href = "/desktop.html";
}

let allNews=[];

fetch("/news").then(r=>r.json()).then(d=>{
allNews=d;
render(d);
});

fetch("/ticker").then(r=>r.json()).then(d=>{
document.getElementById("ticker").innerText=d.text;
});

function render(data){
let html="";
data.forEach((n,i)=>{
html+=`
<div class="card" onclick="openArticle(${i})">
<img src="${n.image}">
<h3>${n.title_en}</h3>
</div>
`;

if(i===2 || i===4 || i===6){
html+=`<div class="ad" id="ad${i}"></div>`;
loadAd(i);
}
});
document.getElementById("news").innerHTML=html;
}

function loadAd(i){
fetch("/ads").then(r=>r.json()).then(ad=>{
document.getElementById("ad"+i).innerHTML=
`<img src="${ad.image}" onclick="window.open('${ad.link}')">`;
});
}

function openArticle(i){
localStorage.setItem("article",JSON.stringify(allNews[i]));
window.location="/article.html";
}

function filter(cat){
if(cat==="All") return render(allNews);
render(allNews.filter(n=>n.category===cat));
}

function goHome(){location.reload();}
function goBlogs(){location="/blog-preview.html";}
function goAdmin(){location="/admin.html";}
function toggleLang(){alert("Connect API later")}
</script>

</body>
</html>
