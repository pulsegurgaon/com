<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PulseGurgaon</title>

<style>
body{margin:0;font-family:Arial;background:#f5f6fa}

/* COMMON */
.badge{
background:#e11d48;color:white;
padding:3px 6px;border-radius:20px;font-size:10px
}

/* MOBILE */
.mobile{display:none}
.mobile header{
background:#e11d48;color:white;
text-align:center;padding:15px;font-weight:bold;font-size:20px
}
.mobile .categories{
display:flex;gap:15px;padding:10px;background:white;overflow-x:auto
}
.mobile .hero img{width:100%;height:250px;object-fit:cover}
.mobile .content{padding:12px}
.mobile .bottomBar{
position:fixed;bottom:0;width:100%;
display:flex;justify-content:space-around;
background:white;padding:10px;border-top:1px solid #ddd
}

/* DESKTOP */
.desktop{display:none}
.desktop header{
background:#e11d48;color:white;
display:flex;justify-content:space-between;padding:10px 20px
}
.desktop .container{
display:grid;grid-template-columns:3fr 1fr;gap:20px;padding:20px
}
.grid{
display:grid;grid-template-columns:1fr 1fr;gap:15px
}
.card{
background:white;border-radius:10px;overflow:hidden;
box-shadow:0 4px 10px rgba(0,0,0,0.08);cursor:pointer
}
.card img{width:100%;height:160px;object-fit:cover}
.cardText{padding:10px}

/* RESPONSIVE SWITCH */
@media(max-width:768px){
.mobile{display:block}
}
@media(min-width:769px){
.desktop{display:block}
}
</style>
</head>

<body>

<!-- MOBILE UI -->
<div class="mobile">

<header>PULSE GURGAON</header>

<div class="categories">
<span>All</span>
<span>India</span>
<span>World</span>
<span>Technology</span>
<span>Finance</span>
</div>

<div class="hero" id="mobileHero"></div>

<div class="content">
<h2 id="mobileTitle"></h2>
<p id="mobileSummary"></p>
</div>

<div class="bottomBar">
<div>🏠 Home</div>
<div style="background:#e11d48;color:white;padding:8px 20px;border-radius:20px">BLOG</div>
<div>⚙️ Admin</div>
</div>

</div>

<!-- DESKTOP UI -->
<div class="desktop">

<header>
<div>PulseGurgaon</div>
<input placeholder="Search news...">
</header>

<div class="container">

<div>
<h2>Latest News</h2>
<div class="grid" id="desktopNews"></div>
</div>

<div>
<h3>Trending Blogs</h3>
<div id="blogs"></div>

<div style="margin-top:20px;padding:20px;border:1px dashed red;border-radius:10px;text-align:center">
ADVERTISEMENT<br>
<button style="background:#e11d48;color:white;border:none;padding:8px 12px;border-radius:6px">Advertise</button>
</div>

</div>

</div>

</div>

<script>

// LOAD DATA
let articles=[];

fetch("articles.json?v="+Date.now())
.then(r=>r.json())
.then(data=>{
articles=data.articles||[];
loadMobile();
loadDesktop();
});

// MOBILE
function loadMobile(){
if(!articles.length) return;

const a=articles[0];

document.getElementById("mobileHero").innerHTML=
`<img src="${a.image || 'https://picsum.photos/400'}">`;

document.getElementById("mobileTitle").innerText=
a.title_en || "No title";

document.getElementById("mobileSummary").innerText=
(a.summary_points||[]).join(" • ");
}

// DESKTOP
function loadDesktop(){
const box=document.getElementById("desktopNews");
if(!box) return;

box.innerHTML="";

articles.slice(0,10).forEach((a,i)=>{

// INLINE AD
if(i===2){
box.innerHTML+=`
<div class="card" style="text-align:center;padding:20px">
ADVERTISEMENT
</div>`;
}

const card=document.createElement("div");
card.className="card";

card.innerHTML=`
<img src="${a.image || 'https://picsum.photos/400'}">
<div class="cardText">
<span class="badge">${a.category}</span>
<h3>${a.title_en}</h3>
<p>${(a.summary_points||[]).join(" • ")}</p>
</div>
`;

card.onclick=()=>{
localStorage.setItem("currentArticle",JSON.stringify(a));
location.href="article.html";
};

box.appendChild(card);

});
}

</script>

</body>
</html>
