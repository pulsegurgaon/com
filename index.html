<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PulseGurgaon</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HEADER -->
<header id="header">
<div class="left">☰</div>
<div class="logo">PulseGurgaon</div>
<div class="right">
<button onclick="showBlogs()">Blogs</button>
<button onclick="toggleLang()">EN/HI</button>
<button onclick="admin()">Admin</button>
</div>
</header>

<!-- TICKER -->
<div class="ticker">
<div id="tickerText"></div>
</div>

<!-- CATEGORIES -->
<div class="categories" id="categories"></div>

<!-- MAIN -->
<div id="main"></div>

<!-- SIDEBAR (DESKTOP ONLY) -->
<div id="sidebar"></div>

<!-- BOTTOM NAV (MOBILE ONLY) -->
<div class="bottomNav">
<div onclick="render()">🏠 Home</div>
<div onclick="showBlogs()">BLOG</div>
<div onclick="admin()">⚙️ Admin</div>
</div>

<script>

// DATA (REAL STRUCTURE)
let articles = [
{
title:"LIVE India Political Clash",
category:"India",
img:"https://picsum.photos/500/300?1",
desc:"Major political war happening now"
},
{
title:"AI Revolution Changing Future",
category:"Technology",
img:"https://picsum.photos/500/300?2",
desc:"AI taking over jobs rapidly"
},
{
title:"Stock Market Crash Warning",
category:"Finance",
img:"https://picsum.photos/500/300?3",
desc:"Experts predict big fall"
},
{
title:"Global War Tension Rising",
category:"World",
img:"https://picsum.photos/500/300?4",
desc:"Countries preparing defenses"
}
];

// DEVICE CHECK
function isMobile(){
return window.innerWidth < 790;
}

// RENDER
function render(list=articles){

let main=document.getElementById("main");
let sidebar=document.getElementById("sidebar");

let html="";

// MAIN ARTICLES
list.forEach((a,i)=>{

html+=`
<div class="card" onclick="openArticle(${i})">
<img src="${a.img}">
<h2>${a.title}</h2>
<p>${a.desc}</p>
</div>
`;

if(i==2 || i==4){
html+=`<div class="ad">ADVERTISEMENT</div>`;
}

});

main.innerHTML=html;

// DESKTOP SIDEBAR
if(!isMobile()){
sidebar.innerHTML=`
<h3>🔥 Trending</h3>
<p>Tech Boom</p>
<p>Startup Growth</p>

<div class="adBox">
ADVERTISE HERE
</div>
`;
}else{
sidebar.innerHTML="";
}

}

// FILTER
function loadCategories(){
let cats=["All","India","World","Technology","Finance"];

let html="";
cats.forEach(c=>{
html+=`<span onclick="filter('${c}')">${c}</span>`;
});

document.getElementById("categories").innerHTML=html;
}

function filter(cat){
if(cat=="All"){render();return;}
render(articles.filter(a=>a.category==cat));
}

// CLICK FIX (your bug solved here)
function openArticle(i){
let article=articles[i];
alert(article.title);
}

// BLOGS
function showBlogs(){
document.getElementById("main").innerHTML=`
<div class="card">🔥 Blog 1</div>
<div class="card">🔥 Blog 2</div>
<div class="card">🔥 Blog 3</div>
`;
}

// ADMIN
function admin(){
alert("Admin Panel");
}

// LANGUAGE
function toggleLang(){
alert("Language toggled");
}

// TICKER
let t=document.getElementById("tickerText");
t.innerText="🔥 Breaking News • Tech • India • World Updates • PulseGurgaon Live";
t.style.animation="scroll 20s linear infinite";

// INIT
loadCategories();
render();

// RESIZE LIVE SWITCH 🔥
window.addEventListener("resize",()=>{
render();
});

</script>

</body>
</html>
