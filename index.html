<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PulseGurgaon</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="header">
☰ <span class="logo">PulseGurgaon</span>

<input id="search" placeholder="Search news...">

<button class="lang" onclick="toggleLang()">EN / HI</button>
</div>

<div class="categories">
<span onclick="filterNews('All')">All</span>
<span onclick="filterNews('India')">India</span>
<span onclick="filterNews('World')">World</span>
<span onclick="filterNews('Technology')">Technology</span>
<span onclick="filterNews('Finance')">Finance</span>
<span onclick="goBlogs()">Blogs</span>
</div>

<div class="ticker">
<div id="tickerText"></div>
</div>

<div id="newsContainer"></div>

<div class="bottomNav">
<div onclick="goHome()">🏠 Home</div>
<div class="active" onclick="goBlogs()">BLOG</div>
<div onclick="goAdmin()">⚙️ Admin</div>
</div>

<script>

if(window.innerWidth > 790){
window.location.href="/desktop.html";
}

let allNews=[];

fetch("/news").then(r=>r.json()).then(data=>{
allNews=data;
renderNews(data);
});

fetch("/ticker").then(r=>r.json()).then(d=>{
document.getElementById("tickerText").innerText=d.text;
});

function renderNews(data){
let html="";

data.forEach((n,i)=>{

html+=`
<div class="card" onclick="openArticle(${i})">

<div class="imageRow">
<img src="${n.image}">
</div>

<div class="content">
<h2><span class="liveDot"></span> ${n.title_en}</h2>
<p>${(n.summary_points||[])[0] || ""}</p>
</div>

</div>
`;

if(i===2 || i===4 || i===6){
html+=`<div class="ad" id="ad${i}"></div>`;
loadAd(i);
}

});

document.getElementById("newsContainer").innerHTML=html;
}

function loadAd(i){
fetch("/ads").then(r=>r.json()).then(ad=>{
document.getElementById("ad"+i).innerHTML=
`<img src="${ad.image}" onclick="window.open('${ad.link}')">`;
});
}

function openArticle(i){
localStorage.setItem("article",JSON.stringify(allNews[i]));
window.location="/article.html";
}

function filterNews(cat){
if(cat==="All") return renderNews(allNews);
renderNews(allNews.filter(n=>n.category===cat));
}

function goHome(){location.reload();}
function goBlogs(){location="/blog-preview.html";}
function goAdmin(){location="/admin.html";}

function toggleLang(){
alert("Language API connect later");
}

document.getElementById("search").addEventListener("input",e=>{
let val=e.target.value.toLowerCase();
let filtered=allNews.filter(n=>n.title_en.toLowerCase().includes(val));
renderNews(filtered);
});

</script>

</body>
</html>
