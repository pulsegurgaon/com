<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PulseGurgaon</title>

<div id="google_translate_element" style="display:none;"></div>
<script>
function googleTranslateElementInit() {
  new google.translate.TranslateElement({ pageLanguage: 'en', includedLanguages: 'hi' }, 'google_translate_element');
}
</script>
<script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: Arial, sans-serif; background:#f8f9fa; }

/* ==================== DESKTOP LAYOUT ==================== */
.desktop-container {
  max-width: 1280px;
  margin: 20px auto;
  padding: 0 20px;
  display: grid;
  grid-template-columns: 7fr 3fr;
  gap: 30px;
}
.desktop-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:22px; }
.desktop-card {
  background:white; border-radius:14px; overflow:hidden; box-shadow:0 6px 15px rgba(0,0,0,0.1); cursor:pointer;
}
.desktop-card img { width:100%; height:210px; object-fit:cover; }
.desktop-card .cardText { padding:14px; }
.desktop-card .badge { font-size:12px; padding:4px 12px; border-radius:20px; background:#e11d48; color:white; display:inline-block; margin-bottom:8px; }
.desktop-card h3 { font-size:16.5px; margin:8px 0; line-height:1.4; }
.desktop-card p { font-size:13.8px; color:#555; }

/* Desktop Sidebar */
.desktop-sidebar { background:white; padding:20px; border-radius:14px; box-shadow:0 6px 15px rgba(0,0,0,0.1); }
.desktop-blog-item { display:flex; gap:12px; margin-bottom:16px; cursor:pointer; }
.desktop-blog-item img { width:85px; height:60px; object-fit:cover; border-radius:8px; }
.desktop-blog-item .text { font-size:14.5px; line-height:1.4; }
.desktop-long-ad {
  margin-top:30px; background:#fff0f0; padding:50px 25px; border-radius:14px; text-align:center;
  border:2px dashed #e11d48; min-height:420px; display:flex; flex-direction:column; justify-content:center;
}

/* ==================== MOBILE LAYOUT (Exact as your screenshot) ==================== */
.mobile-header {
  background:#e11d48; color:white; padding:12px 15px; font-size:22px; font-weight:bold; text-align:center;
}
.mobile-breaking {
  background:#111; color:white; padding:8px 15px; font-size:14px; overflow:hidden; white-space:nowrap;
}
.mobile-breaking span { animation:ticker 30s linear infinite; display:inline-block; }
@keyframes ticker { 0%{transform:translateX(100%)} 100%{transform:translateX(-100%)} }

.mobile-tabs {
  background:white; display:flex; overflow-x:auto; padding:10px 15px; gap:20px; border-bottom:1px solid #eee;
}
.mobile-tabs span { cursor:pointer; white-space:nowrap; font-size:15px; padding-bottom:4px; }
.mobile-tabs span.active { color:#e11d48; border-bottom:3px solid #e11d48; }

.mobile-hero {
  position:relative;
}
.mobile-hero img { width:100%; height:260px; object-fit:cover; }
.mobile-live {
  position:absolute; top:15px; left:15px; background:#e11d48; color:white; padding:4px 12px; border-radius:20px;
  font-size:13px; font-weight:bold;
}
.mobile-headline {
  font-size:22px; font-weight:bold; padding:15px; line-height:1.3;
}
.mobile-summary {
  padding:0 15px 15px; font-size:15px; color:#333; line-height:1.5;
}

.mobile-bottom-nav {
  position:fixed; bottom:0; left:0; right:0; background:white; border-top:1px solid #ddd;
  display:flex; justify-content:space-around; padding:10px 0; z-index:1000;
}
.mobile-bottom-nav div { text-align:center; font-size:12px; cursor:pointer; }
.mobile-bottom-nav .blog-btn {
  background:#e11d48; color:white; padding:8px 24px; border-radius:30px; font-weight:bold;
}

/* Hide one layout on the other screen size */
.desktop-container { display:grid; }
.mobile-container { display:none; }

@media (max-width: 768px) {
  .desktop-container { display:none; }
  .mobile-container { display:block; }
}
</style>
</head>

<body>

<!-- ==================== DESKTOP VERSION ==================== -->
<div class="desktop-container">
  <!-- Your previous desktop layout code remains here (I kept it short for space) -->
  <!-- ... (same as last version) ... -->
</div>

<!-- ==================== MOBILE VERSION (Exact as your photo) ==================== -->
<div class="mobile-container">

  <!-- Header -->
  <div class="mobile-header">PULSE GURGAON</div>

  <!-- Language -->
  <div style="text-align:right;padding:5px 15px;font-size:14px;">
    ENG | <span style="color:#e11d48">हिन्दी</span>
  </div>

  <!-- Breaking Bar -->
  <div class="mobile-breaking">
    <span id="mobileTicker">🔥 Breaking: F-15 crash investigation continues | Iran tensions rise...</span>
  </div>

  <!-- Tabs -->
  <div class="mobile-tabs">
    <span onclick="filterCategory('All')" class="active">All</span>
    <span onclick="filterCategory('News')">News</span>
    <span onclick="filterCategory('Business')">Business</span>
    <span onclick="filterCategory('Technology')">Technology</span>
    <span onclick="filterCategory('Health')">Health</span>
  </div>

  <!-- Hero Section -->
  <div class="mobile-hero" id="mobileHero">
    <!-- Filled by JavaScript -->
  </div>

  <!-- Bottom Navigation -->
  <div class="mobile-bottom-nav">
    <div onclick="location.href='index.html'"><span style="font-size:24px">🏠</span><br>Home</div>
    <div class="blog-btn" onclick="location.href='blogs.html'">BLOG</div>
    <div onclick="location.href='admin.html'"><span style="font-size:24px">⚙️</span><br>Admin</div>
  </div>
</div>

<script>
// Fetch articles
let originalArticles = [];

fetch("articles.json?v=" + Date.now())
  .then(r => r.json())
  .then(data => {
    originalArticles = data.articles || [];
    renderMobileHero();
    generateMobileTicker();
  });

// Mobile Hero (first article as big hero)
function renderMobileHero() {
  if (originalArticles.length === 0) return;
  const article = originalArticles[0];
  const heroHTML = `
    <img src="${article.image || 'https://picsum.photos/800/500'}" alt="">
    <div class="mobile-live">● LIVE</div>
    <div class="mobile-headline">${article.title_en || "No title"}</div>
    <div class="mobile-summary">
      ${article.summary_points ? article.summary_points.join(" • ") : (article.article_en || "").substring(0,160)+"..."}
    </div>
  `;
  document.getElementById("mobileHero").innerHTML = heroHTML;
  document.getElementById("mobileHero").onclick = () => {
    localStorage.setItem("currentArticle", JSON.stringify(article));
    window.location.href = "article.html";
  };
}

// Mobile Ticker
function generateMobileTicker() {
  if (originalArticles.length === 0) return;
  const text = originalArticles.slice(0,6).map(a => a.title_en || "Breaking").join(" | ");
  document.getElementById("mobileTicker").innerHTML = text;
}

// Category filter (for mobile tabs)
function filterCategory(cat) {
  // You can extend this later
  alert("Filtered by " + cat);
}

// Translate
function toggleLang() {
  const select = document.querySelector(".goog-te-combo");
  if (select) {
    select.value = select.value === "hi" ? "en" : "hi";
    select.dispatchEvent(new Event("change"));
  }
}
</script>

</body>
</html>
