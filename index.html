<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PulseGurgaon</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HEADER -->
<header class="topBar">
<div class="left">☰ PulseGurgaon</div>
<input type="text" placeholder="Search news...">
<div class="right">
<button onclick="goBlogs()">Blogs</button>
<button onclick="toggleLang()">EN / HI</button>
<button onclick="location.href='admin.html'">ADMIN</button>
</div>
</header>

<!-- CATEGORY -->
<div class="categories">
<span onclick="filter('All')">All</span>
<span onclick="filter('India')">India</span>
<span onclick="filter('World')">World</span>
<span onclick="filter('Technology')">Technology</span>
<span onclick="filter('Finance')">Finance</span>
<span onclick="goBlogs()">Blogs</span>
</div>

<!-- TICKER -->
<div class="ticker">
<div id="tickerText">Loading news...</div>
</div>

<!-- MAIN -->
<div id="app"></div>

<script>

let articles=[];
let filtered=[];

// FETCH NEWS
fetch("articles.json?v="+Date.now())
.then(r=>r.json())
.then(d=>{
articles=d.articles||[];
filtered=[...articles];
render();
});

// FETCH TICKER
fetch("/ticker")
.then(r=>r.json())
.then(d=>{
const text=d.text;
const el=document.getElementById("tickerText");

el.innerText=text;
el.style.animation=`scroll ${text.length/5}s linear infinite`;
});

// SAFE DATA
function safe(a){
return{
title:a.title_en||"No title",
summary:(a.summary_points||[]).join(" • "),
image:a.image||"https://picsum.photos/400"
};
}

// MAIN RENDER (IF BASED)
function render(){

if(window.innerWidth > 900){
renderDesktop();
}else{
renderMobile();
}

}

// MOBILE UI
function renderMobile(){

let html="";

// HERO
const first=safe(filtered[0]);

html+=`
<div class="hero">
<img src="${first.image}">
<h2>🔴 LIVE ${first.title}</h2>
<p>${first.summary}</p>
</div>
`;

// NEWS
filtered.slice(1,20).forEach((a,i)=>{
const d=safe(a);

html+=`
<div class="newsItem" onclick="openArticle('${a.id}')">
<img src="${d.image}">
<div>
<h3>${d.title}</h3>
<p>${d.summary}</p>
</div>
</div>
`;

// ADS LOGIC
if(i===2 || i===4 || i===6){
html+=`<div class="ads">ADVERTISEMENT</div>`;
}

});

html+=`
<div class="bottomNav">
<div onclick="location.href='index.html'">🏠 Home</div>
<div class="center" onclick="goBlogs()">BLOG</div>
<div onclick="location.href='admin.html'">⚙️ Admin</div>
</div>
`;

document.getElementById("app").innerHTML=html;
}

// DESKTOP UI (BBC STYLE)
function renderDesktop(){

let html="";

html+=`<div class="desktop">`;

// LEFT MAIN
html+=`<div class="main">`;

// TOP HERO + SIDE
const first=safe(filtered[0]);
const second=safe(filtered[1]);

html+=`
<div class="topGrid">

<div class="big">
<img src="${first.image}">
<h2>🔴 LIVE ${first.title}</h2>
<p>${first.summary}</p>
</div>

<div class="side">
<img src="${second.image}">
<h3>${second.title}</h3>
<p>${second.summary}</p>
</div>

</div>
`;

// GRID NEWS
html+=`<div class="grid">`;

filtered.slice(2,10).forEach(a=>{
const d=safe(a);

html+=`
<div class="card" onclick="openArticle('${a.id}')">
<img src="${d.image}">
<h4>${d.title}</h4>
<p>${d.summary}</p>
</div>
`;
});

html+=`</div>`;

// AD
html+=`<div class="ads large">ADVERTISEMENT</div>`;

// MORE NEWS
html+=`<div class="grid">`;

filtered.slice(10,20).forEach(a=>{
const d=safe(a);

html+=`
<div class="card" onclick="openArticle('${a.id}')">
<img src="${d.image}">
<h4>${d.title}</h4>
<p>${d.summary}</p>
</div>
`;
});

html+=`</div>`;

html+=`</div>`; // main

// RIGHT SIDEBAR
html+=`<div class="sidebar">`;

html+=`<h3>🔥 Trending Blogs</h3>`;

html+=`<div id="blogList"></div>`;

html+=`
<div class="adsBox">
<h4>ADVERTISEMENT</h4>
<p>Boost your business with PulseGurgaon</p>
<button>Advertise Now</button>
</div>
`;

html+=`</div>`;

// END
html+=`</div>`;

document.getElementById("app").innerHTML=html;

// LOAD BLOGS
fetch("/blogs")
.then(r=>r.json())
.then(data=>{
let blogHTML="";
data.slice(0,5).forEach(b=>{
blogHTML+=`<p>${b.title}</p>`;
});
document.getElementById("blogList").innerHTML=blogHTML;
});

}

// OPEN ARTICLE
function openArticle(id){
const article = articles.find(a=>a.id==id);
localStorage.setItem("currentArticle", JSON.stringify(article));
location.href="article.html";
}

// FILTER
function filter(cat){

if(cat==="All"){
filtered=[...articles];
}else{
filtered=articles.filter(a=>
(a.category||"").toLowerCase().includes(cat.toLowerCase())
);
}

render();
}

// BLOG NAV
function goBlogs(){
location.href="blog.html";
}

// LANG
function toggleLang(){
alert("Language toggle working (connect API later)");
}

// RESPONSIVE
window.onresize=render;

</script>

</body>
</html>
