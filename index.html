<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PulseGurgaon</title>

<meta name="google" content="notranslate">

<!-- GOOGLE TRANSLATE -->
<div id="google_translate_element" style="display:none;"></div>
<script>
function googleTranslateElementInit() {
  new google.translate.TranslateElement({
    pageLanguage: 'en',
    includedLanguages: 'hi',
    autoDisplay: false
  }, 'google_translate_element');
}
</script>
<script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

<style>

body{margin:0;font-family:Arial;background:#f5f6fa}

/* HEADER */
header{
background:#e11d48;color:white;
display:flex;align-items:center;justify-content:space-between;
padding:12px 16px;
}
.logo{font-weight:bold;font-size:18px}

.topNav{display:flex;gap:15px;font-size:14px}

.search{
padding:8px 12px;border-radius:20px;border:none;width:200px
}

/* CATEGORY */
.categories{
display:flex;gap:15px;
padding:10px 15px;background:white;border-bottom:1px solid #eee;
overflow-x:auto;
}
.categories span{cursor:pointer;font-size:13px}
.active{color:#e11d48;border-bottom:2px solid #e11d48}

/* BREAKING */
.breaking{background:#e11d48;color:white;font-size:13px}
.ticker{padding:6px 15px}

/* LAYOUT */
.container{
max-width:1100px;margin:auto;padding:15px;
display:grid;grid-template-columns:3fr 1fr;gap:20px;
}

/* FILTERS */
.filters{
background:white;padding:10px;border-radius:10px;margin-bottom:15px;
display:flex;gap:10px;flex-wrap:wrap;
}
.filters select,.filters button{
padding:6px;border-radius:6px;border:1px solid #ddd;
}
.filters button{background:#e11d48;color:white;border:none}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
}

/* CARD */
.card{
background:white;border-radius:12px;
overflow:hidden;box-shadow:0 4px 10px rgba(0,0,0,0.08);
cursor:pointer;
}
.card img{
width:100%;height:160px;object-fit:cover;
}
.cardText{padding:10px}
.badge{
font-size:10px;background:#e11d48;color:white;
padding:3px 6px;border-radius:20px;
}
.card h3{font-size:14px;margin:5px 0}
.card p{font-size:12px;color:#555}

/* INLINE AD */
.ad{
grid-column:span 2;
background:#fff;
border-radius:10px;
padding:15px;
text-align:center;
}

/* SIDEBAR */
.sidebar{
background:white;padding:12px;border-radius:10px;
}
.sideAd{
height:250px;background:#eee;
display:flex;align-items:center;justify-content:center;
}

/* MOBILE */
@media(max-width:768px){
.container{grid-template-columns:1fr}
.grid{grid-template-columns:1fr}
.ad{grid-column:span 1}
.search{width:120px}
}

/* TOP BANNER */
.banner{
position:fixed;bottom:0;width:100%;
background:#e11d48;color:white;
padding:10px;text-align:center;
z-index:9999;
}
.close{position:absolute;right:15px;cursor:pointer}

</style>
</head>

<body>

<header>
<div class="logo">PulseGurgaon</div>

<div class="topNav">
<span>News</span>
<span>Blogs</span>
<span>AI Search</span>
</div>

<input id="searchInput" class="search" placeholder="Search...">

<button onclick="toggleLang()">EN/HI</button>
</header>

<div class="categories">
<span onclick="filter('All')" class="active">All</span>
<span onclick="filter('India')">India</span>
<span onclick="filter('World')">World</span>
<span onclick="filter('Technology')">Technology</span>
<span onclick="filter('Finance')">Finance</span>
</div>

<div class="breaking">
<div class="ticker" id="ticker">🔥 Loading...</div>
</div>

<div class="container">

<div>

<h2>Latest News</h2>

<div class="filters">
<select id="cat">
<option value="">Category</option>
<option>India</option>
<option>World</option>
<option>Technology</option>
<option>Finance</option>
</select>
<button onclick="applyFilter()">Search</button>
</div>

<div class="grid" id="news"></div>

</div>

<div class="sidebar">
<div class="sideAd" id="adsBox">Ad</div>
</div>

</div>

<div id="banner" class="banner">
🔥 Limited Offer - Click Now
<span class="close" onclick="closeBanner()">✕</span>
</div>

<script>

// TRANSLATE
function toggleLang(){
const select=document.querySelector(".goog-te-combo");
if(select){
select.value=select.value==="hi"?"en":"hi";
select.dispatchEvent(new Event("change"));
}
}

// BANNER AUTO CLOSE
setTimeout(()=>closeBanner(),2000);
function closeBanner(){
document.getElementById("banner").style.display="none";
}

// FETCH ADS
fetch("/ads")
.then(r=>r.json())
.then(ad=>{
document.getElementById("adsBox").innerHTML=
`<a href="${ad.link}" target="_blank">${ad.text}</a>`;
});

// FETCH TICKER
fetch("/ticker")
.then(r=>r.json())
.then(d=>{
document.getElementById("ticker").innerText=d.text;
});

// NEWS
let original=[],filtered=[];

fetch("articles.json?v="+Date.now())
.then(r=>r.json())
.then(data=>{
original=data.articles||[];
filtered=[...original];
render();
});

// SAFE
function safe(a){
return {
title:a.title_en||"Breaking News",
summary:(a.summary_points||[]).join(" • ") || (a.article_en||"").slice(0,100),
image:a.image||"https://picsum.photos/400",
category:a.category||"General"
};
}

// RENDER
function render(){
const box=document.getElementById("news");
box.innerHTML="";

filtered.slice(0,20).forEach((a,i)=>{

if(i===4){
box.innerHTML+=`<div class="ad">ADVERTISEMENT</div>`;
}

const d=safe(a);

const card=document.createElement("div");
card.className="card";

card.innerHTML=`
<img src="${d.image}">
<div class="cardText">
<span class="badge">${d.category}</span>
<h3>${d.title}</h3>
<p>${d.summary}</p>
</div>
`;

card.onclick=()=>{
localStorage.setItem("currentArticle",JSON.stringify(a));
location.href="article.html";
};

box.appendChild(card);
});
}

// FILTER
function applyFilter(){
const cat=document.getElementById("cat").value;
filtered=cat?original.filter(a=>a.category===cat):[...original];
render();
}

// SEARCH
searchInput.addEventListener("input",function(){
const q=this.value.toLowerCase();
filtered=original.filter(a=>
(a.title_en||"").toLowerCase().includes(q)
);
render();
});

</script>

</body>
</html>
