<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PulseGurgaon</title>

<div id="google_translate_element" style="display:none;"></div>
<script>
function googleTranslateElementInit() {
  new google.translate.TranslateElement({ pageLanguage: 'en', includedLanguages: 'hi' }, 'google_translate_element');
}
</script>
<script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: Arial, sans-serif; background:#f8f9fa; }

/* ==================== MOBILE LAYOUT (Default for phones) ==================== */
.mobile-header {
  background:#e11d48; color:white; padding:12px 15px; font-size:22px; font-weight:bold; text-align:center;
}
.mobile-breaking {
  background:#111; color:white; padding:8px 15px; font-size:14px; overflow:hidden; white-space:nowrap;
}
.mobile-breaking span { animation:ticker 30s linear infinite; display:inline-block; }
@keyframes ticker { 0%{transform:translateX(100%)} 100%{transform:translateX(-100%)} }

.mobile-tabs {
  background:white; display:flex; overflow-x:auto; padding:10px 15px; gap:20px; border-bottom:1px solid #eee;
}
.mobile-tabs span { cursor:pointer; white-space:nowrap; font-size:15px; padding-bottom:4px; }
.mobile-tabs span.active { color:#e11d48; border-bottom:3px solid #e11d48; }

.mobile-hero { position:relative; }
.mobile-hero img { width:100%; height:260px; object-fit:cover; }
.mobile-live {
  position:absolute; top:15px; left:15px; background:#e11d48; color:white;
  padding:4px 12px; border-radius:20px; font-size:13px; font-weight:bold;
}
.mobile-headline { font-size:22px; font-weight:bold; padding:15px; line-height:1.3; }
.mobile-summary { padding:0 15px 20px; font-size:15px; color:#333; line-height:1.5; }

.mobile-bottom-nav {
  position:fixed; bottom:0; left:0; right:0; background:white; border-top:1px solid #ddd;
  display:flex; justify-content:space-around; padding:10px 0; z-index:1000;
}
.mobile-bottom-nav div { text-align:center; font-size:12px; cursor:pointer; }
.mobile-bottom-nav .blog-btn {
  background:#e11d48; color:white; padding:8px 24px; border-radius:30px; font-weight:bold;
}

/* ==================== DESKTOP LAYOUT ==================== */
.desktop-container {
  max-width: 1280px;
  margin: 20px auto;
  padding: 0 20px;
  display: grid;
  grid-template-columns: 7fr 3fr;
  gap: 30px;
}
.desktop-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:22px; }
.desktop-card {
  background:white; border-radius:14px; overflow:hidden; box-shadow:0 6px 15px rgba(0,0,0,0.1); cursor:pointer;
}
.desktop-card img { width:100%; height:210px; object-fit:cover; }
.desktop-card .cardText { padding:14px; }
.desktop-card .badge { font-size:12px; padding:4px 12px; border-radius:20px; background:#e11d48; color:white; display:inline-block; margin-bottom:8px; }
.desktop-card h3 { font-size:16.5px; margin:8px 0; line-height:1.4; }
.desktop-card p { font-size:13.8px; color:#555; }

/* Hide mobile on large screen, hide desktop on small screen */
.mobile-container { display:block; }
.desktop-container { display:none; }

@media (min-width: 769px) {
  .mobile-container { display:none; }
  .desktop-container { display:grid; }
}
</style>
</head>

<body>

<!-- ==================== MOBILE LAYOUT ==================== -->
<div class="mobile-container">

  <div class="mobile-header">PULSE GURGAON</div>

  <div style="text-align:right;padding:5px 15px;font-size:14px;">
    ENG | <span onclick="toggleLang()" style="color:#e11d48;cursor:pointer">हिन्दी</span>
  </div>

  <div class="mobile-breaking">
    <span id="mobileTicker">🔥 Loading breaking news...</span>
  </div>

  <div class="mobile-tabs">
    <span onclick="filterCategory('All')" class="active">All</span>
    <span onclick="filterCategory('India')">India</span>
    <span onclick="filterCategory('World')">World</span>
    <span onclick="filterCategory('Technology')">Technology</span>
    <span onclick="filterCategory('Finance')">Finance</span>
  </div>

  <div class="mobile-hero" id="mobileHero"></div>

  <div class="mobile-bottom-nav">
    <div onclick="location.href='index.html'">🏠<br>Home</div>
    <div class="blog-btn" onclick="location.href='blogs.html'">BLOG</div>
    <div onclick="location.href='admin.html'">⚙️<br>Admin</div>
  </div>
</div>

<!-- ==================== DESKTOP LAYOUT ==================== -->
<div class="desktop-container">
  <!-- Your previous desktop layout will go here if needed. For now it's hidden on mobile -->
  <p style="text-align:center;padding:40px;color:#666;">Desktop layout active</p>
</div>

<script>
// Fetch articles
let originalArticles = [];

fetch("articles.json?v=" + Date.now())
  .then(r => r.json())
  .then(data => {
    originalArticles = data.articles || [];
    renderMobileHero();
    generateMobileTicker();
  });

// Mobile Hero
function renderMobileHero() {
  if (originalArticles.length === 0) return;
  const a = originalArticles[0];
  const html = `
    <img src="${a.image || 'https://picsum.photos/800/500'}" alt="">
    <div class="mobile-live">● LIVE</div>
    <div class="mobile-headline">${a.title_en || "No title"}</div>
    <div class="mobile-summary">
      ${a.summary_points ? a.summary_points.join(" • ") : (a.article_en || "").substring(0,160)+"..."}
    </div>
  `;
  document.getElementById("mobileHero").innerHTML = html;
  document.getElementById("mobileHero").onclick = () => {
    localStorage.setItem("currentArticle", JSON.stringify(a));
    window.location.href = "article.html";
  };
}

// Mobile Ticker
function generateMobileTicker() {
  if (originalArticles.length === 0) return;
  const text = originalArticles.slice(0,6).map(a => a.title_en || "Breaking").join(" | ");
  document.getElementById("mobileTicker").innerHTML = text;
}

// Simple category filter
function filterCategory(cat) {
  alert("Filtered by " + cat + " (you can expand this later)");
}

// Translate
function toggleLang() {
  const select = document.querySelector(".goog-te-combo");
  if (select) {
    select.value = select.value === "hi" ? "en" : "hi";
    select.dispatchEvent(new Event("change"));
  }
}
</script>

</body>
</html>
