<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PulseGurgaon</title>
<link rel="stylesheet" href="style.css">

<div id="google_translate_element" style="display:none;"></div>
<script>
function googleTranslateElementInit() {
new google.translate.TranslateElement({
pageLanguage: 'en',
includedLanguages: 'hi'
}, 'google_translate_element');
}
</script>
<script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

</head>

<body>

<!-- HEADER -->
<header>
<div>☰</div>
<div class="logo">PULSE GURGAON</div>
<button onclick="toggleLang()">ENG | हिंदी</button>
</header>

<!-- CATEGORY -->
<div class="categories">
<span onclick="filter('All')">All</span>
<span onclick="filter('India')">India</span>
<span onclick="filter('World')">World</span>
<span onclick="filter('Tech')">Tech</span>
<span onclick="filter('Finance')">Finance</span>
</div>

<!-- TICKER -->
<div class="ticker">
<div id="tickerText">Loading...</div>
</div>

<!-- HERO -->
<div id="hero"></div>

<!-- NEWS -->
<div id="newsList"></div>

<!-- ADS -->
<div class="ads">ADVERTISEMENT</div>

<!-- BLOG -->
<div class="blogs" id="blogs"></div>

<!-- BOTTOM NAV -->
<div class="bottomNav">
<div onclick="location.href='index.html'">🏠 Home</div>
<div onclick="location.href='blog.html'" class="center">BLOG</div>
<div onclick="location.href='admin.html'">⚙️ Admin</div>
</div>

<script>

let articles=[];
let filtered=[];

// FETCH
fetch("articles.json?v="+Date.now())
.then(r=>r.json())
.then(d=>{
articles=d.articles||[];
filtered=[...articles];
render();
});

// TICKER
fetch("/ticker")
.then(r=>r.json())
.then(d=>{
document.getElementById("tickerText").innerText=d.text;
});

// BLOGS
fetch("/blogs")
.then(r=>r.json())
.then(data=>{
let html="";
data.slice(0,5).forEach(b=>{
html+=`<div class="blogItem">${b.title}</div>`;
});
document.getElementById("blogs").innerHTML=html;
});

// SAFE
function safe(a){
return{
title:a.title_en||"No title",
summary:(a.summary_points||[]).join(" • "),
image:a.image||"https://picsum.photos/400"
}
}

// RENDER
function render(){

// HERO
const first=safe(filtered[0]);

document.getElementById("hero").innerHTML=`
<img src="${first.image}">
<h2>🔴 LIVE ${first.title}</h2>
<p>${first.summary}</p>
`;

// LIST
let html="";

filtered.slice(1,15).forEach((a,i)=>{
const d=safe(a);

html+=`
<div class="newsItem" onclick="openArticle(${i})">
<img src="${d.image}">
<div>
<h3>${d.title}</h3>
<p>${d.summary}</p>
</div>
</div>`;
});

document.getElementById("newsList").innerHTML=html;
}

// OPEN ARTICLE
function openArticle(i){
localStorage.setItem("currentArticle",JSON.stringify(filtered[i]));
location.href="article.html";
}

// FILTER
function filter(cat){
filtered = cat==="All"
?[...articles]
:articles.filter(a=>a.category===cat);

render();
}

// TRANSLATE
function toggleLang(){
const select=document.querySelector(".goog-te-combo");
if(select){
select.value=select.value==="hi"?"en":"hi";
select.dispatchEvent(new Event("change"));
}
}

</script>

</body>
</html>
