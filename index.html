<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>PulseGurgaon</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f6f6f6;
}

header{
background:white;
padding:15px;
display:flex;
align-items:center;
justify-content:space-between;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.logo{
font-weight:bold;
font-size:22px;
color:#e11d48;
}

.search{
padding:8px;
border-radius:20px;
border:1px solid #ccc;
width:40%;
}

.admin{
background:#ff7a18;
color:white;
border:none;
padding:8px 14px;
border-radius:20px;
}

.categories{
display:flex;
gap:15px;
padding:10px;
background:white;
overflow-x:auto;
}

.categories span{
color:#555;
font-size:14px;
}

.breaking{
background:red;
color:white;
padding:6px;
font-size:13px;
text-align:center;
}

.hero{
margin:20px;
border-radius:12px;
overflow:hidden;
background:white;
}

.hero img{
width:100%;
height:220px;
object-fit:cover;
}

.hero h1{
padding:15px;
margin:0;
}

.container{
padding:15px;
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

.card{
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.card img{
width:100%;
height:120px;
object-fit:cover;
}

.card h3{
padding:10px;
margin:0;
font-size:16px;
}

.card p{
padding:0 10px 10px;
font-size:13px;
color:#555;
}

footer{
background:#111;
color:white;
padding:30px;
margin-top:30px;
text-align:center;
}

</style>
</head>

<body>

<header>

<div class="logo">PulseGurgaon</div>

<input class="search" placeholder="Search news...">

<button class="admin">ADMIN</button>

</header>

<div class="categories">

<span>All</span>
<span>Gurgaon</span>
<span>India</span>
<span>World</span>
<span>Finance</span>
<span>Technology</span>

</div>

<div class="breaking">

Breaking: AI powered news from Gurgaon now live

</div>

<div class="hero" id="hero"></div>

<div class="container" id="news"></div>

<footer>

PulseGurgaon • AI Powered Local News

</footer>

<script>

fetch("articles.json")
.then(res => res.json())
.then(data => {

const hero = document.getElementById("hero")
const news = document.getElementById("news")

const articles = data.articles

if(articles.length>0){

hero.innerHTML = `
<img src="${articles[0].image}">
<h1>${articles[0].title}</h1>
`

}

articles.slice(1).forEach(a => {

const card = document.createElement("div")
card.className="card"

card.innerHTML=`
<img src="${a.image}">
<h3>${a.title}</h3>
<p>${a.summary}</p>
`

news.appendChild(card)

})

})

</script>

</body>
</html>
