<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PulseGurgaon</title>
<link rel="stylesheet" href="style.css">

<script>
if(window.innerWidth > 790){
location.href="desktop.html";
}
</script>
</head>

<body>

<header class="header">
<div>☰</div>
<div class="logo">PulseGurgaon</div>
<div id="google_translate_element"></div>
</header>

<div class="ticker"><div id="tickerText"></div></div>

<div class="categories" id="categories"></div>

<div id="main"></div>

<div class="bottomNav">
<div onclick="loadHome()">🏠 Home</div>
<div onclick="loadBlogs()">BLOG</div>
<div onclick="alert('Admin')">⚙️ Admin</div>
</div>

<script>

// DATA
let articles=[
{id:1,title:"LIVE Political War",cat:"India",img:"https://picsum.photos/400/300?1",desc:"Big clash happening"},
{id:2,title:"AI Boom Future",cat:"Technology",img:"https://picsum.photos/400/300?2",desc:"AI revolution"},
{id:3,title:"Market Crash Alert",cat:"Finance",img:"https://picsum.photos/400/300?3",desc:"Stocks falling"},
{id:4,title:"World War Risk",cat:"World",img:"https://picsum.photos/400/300?4",desc:"Tension rising"}
];

let blogs=[
{title:"Future of AI"},
{title:"Startup Growth"},
{title:"India Economy"}
];

// CATEGORY LOAD
function loadCategories(){
let cats=["All","India","World","Technology","Finance"];
let html="";
cats.forEach(c=>{
html+=`<span onclick="filter('${c}')">${c}</span>`;
});
document.getElementById("categories").innerHTML=html;
}

// RENDER ARTICLES
function render(list=articles){
let html="";
list.forEach((a,i)=>{
html+=`
<div class="card" onclick="openArticle(${a.id})">
<img src="${a.img}">
<h2>${a.title}</h2>
<p>${a.desc}</p>
</div>
`;

if(i==2 || i==4){
html+=`<div class="ad">ADVERTISEMENT</div>`;
}
});
document.getElementById("main").innerHTML=html;
}

// FILTER
function filter(cat){
if(cat=="All"){render();return;}
render(articles.filter(a=>a.cat==cat));
}

// FIXED CLICK
function openArticle(id){
let a=articles.find(x=>x.id==id);
document.getElementById("main").innerHTML=`
<div class="articleView">
<h1>${a.title}</h1>
<img src="${a.img}">
<p>${a.desc}</p>
<button onclick="loadHome()">⬅ Back</button>
</div>
`;
}

// BLOG LIST
function loadBlogs(){
let html="<h2>Blogs</h2>";
blogs.forEach(b=>{
html+=`<div class="card">${b.title}</div>`;
});
document.getElementById("main").innerHTML=html;
}

function loadHome(){render();}

// TICKER
let t=document.getElementById("tickerText");
t.innerText="🔥 Breaking • India • Tech • Finance • World • PulseGurgaon Live";
t.style.animation="scroll 25s linear infinite";

// GOOGLE TRANSLATE
function googleTranslateElementInit() {
new google.translate.TranslateElement({pageLanguage: 'en'}, 'google_translate_element');
}

loadCategories();
render();

</script>

<script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

</body>
</html>
