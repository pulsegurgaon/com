<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PulseGurgaon</title>

<style>
:root{
  --red:#e11d48;
  --bg:#f4f5f7;
  --card:#ffffff;
  --text:#222;
  --muted:#666;
  --shadow:0 6px 18px rgba(0,0,0,0.08);
}

*{box-sizing:border-box}
body{margin:0;font-family:Arial;background:var(--bg);color:var(--text)}

/* ===== 2s TOP AD ===== */
.topAd{
  position:fixed;top:0;left:0;width:100%;height:20vh;z-index:9999;
}
.topAd img{width:100%;height:100%;object-fit:cover}
.closeAd{
  position:absolute;right:14px;top:10px;color:#fff;background:rgba(0,0,0,.4);
  padding:4px 10px;border-radius:20px;cursor:pointer;font-size:14px
}

/* ===== HEADER (like ref) ===== */
header{
  background:var(--red);color:#fff;padding:10px 14px;
  display:flex;align-items:center;justify-content:space-between;
}
.brand{display:flex;align-items:center;gap:10px;font-weight:bold}
.brand .logoBox{
  width:26px;height:26px;background:#fff;color:var(--red);
  display:flex;align-items:center;justify-content:center;border-radius:6px;font-weight:800
}
.topNav{display:flex;gap:18px;margin-left:12px;font-size:14px}
.topNav span{opacity:.9;cursor:pointer}
.topRight{display:flex;align-items:center;gap:10px}
.search{
  border:none;border-radius:20px;padding:7px 12px;width:220px;outline:none
}

/* ===== CATEGORY BAR ===== */
.catBar{
  background:#fff;border-bottom:1px solid #eee;
  display:flex;gap:16px;padding:10px 14px;overflow-x:auto
}
.catBar span{font-size:13px;color:#555;cursor:pointer}
.catBar .active{color:var(--red);border-bottom:2px solid var(--red);padding-bottom:6px}

/* ===== BREAKING ===== */
.breaking{background:var(--red);color:#fff;font-size:13px}
.ticker{padding:6px 14px;white-space:nowrap;overflow:hidden}

/* ===== MAIN ===== */
.wrapper{
  max-width:1100px;margin:auto;padding:14px;
  display:grid;grid-template-columns:3fr 1fr;gap:18px;
}

/* ===== FILTERS (like ref row) ===== */
.filters{
  background:#fff;border-radius:10px;padding:12px;box-shadow:var(--shadow);
  display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px
}
.filters select,.filters button{
  padding:7px 10px;border-radius:8px;border:1px solid #ddd;font-size:13px
}
.filters button{background:var(--red);color:#fff;border:none;cursor:pointer}

/* ===== GRID ===== */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:16px;
}

/* ===== CARD (like ref) ===== */
.card{
  background:var(--card);
  border-radius:12px;
  box-shadow:var(--shadow);
  overflow:hidden;
  cursor:pointer;
  transition:.2s;
}
.card:hover{transform:translateY(-3px)}

.card img{
  width:100%;height:150px;object-fit:cover;
}

.cardBody{padding:12px}

.badge{
  display:inline-block;font-size:10px;padding:3px 8px;border-radius:20px;
  background:var(--red);color:#fff;margin-bottom:6px
}

.card h3{font-size:14px;margin:6px 0}
.card p{font-size:12px;color:var(--muted);line-height:1.4}

/* ===== INLINE AD (center block) ===== */
.adInline{
  grid-column:span 2;
  background:#fff;border-radius:12px;box-shadow:var(--shadow);
  padding:12px;text-align:center
}
.adInline img{width:100%;border-radius:8px}

/* ===== SIDEBAR ===== */
.sidebar{
  background:#fff;border-radius:12px;padding:12px;box-shadow:var(--shadow);
}
.sideAd{
  height:250px;background:#eee;border-radius:8px;
  display:flex;align-items:center;justify-content:center;font-size:13px
}

/* ===== MOBILE ===== */
@media(max-width:768px){
  .wrapper{grid-template-columns:1fr}
  .grid{grid-template-columns:1fr}
  .adInline{grid-column:span 1}
  .search{width:140px}
}
</style>
</head>

<body>

<!-- TOP AD -->
<div id="topAd" class="topAd">
  <span class="closeAd" onclick="closeAd()">✕</span>
  <a href="#"><img id="adImage" src="https://picsum.photos/1200/200"></a>
</div>

<header>
  <div class="brand">
    <div class="logoBox">P</div>
    PulseGurgaon
    <div class="topNav">
      <span>News</span>
      <span>Blogs</span>
      <span>AI Search</span>
    </div>
  </div>

  <div class="topRight">
    <input class="search" placeholder="Search news...">
  </div>
</header>

<div class="catBar">
  <span class="active">All</span>
  <span>India</span>
  <span>World</span>
  <span>Technology</span>
  <span>Finance</span>
  <span>General</span>
</div>

<div class="breaking">
  <div class="ticker">🔥 Breaking news loading...</div>
</div>

<div class="wrapper">

  <div>
    <h2 style="margin:10px 0">Latest News</h2>

    <div class="filters">
      <select id="dateFilter">
        <option value="">Date Range</option>
        <option value="1">24h</option>
        <option value="7">7 days</option>
      </select>

      <select id="categoryFilter">
        <option value="">Category</option>
        <option>India</option>
        <option>World</option>
        <option>Finance</option>
        <option>Technology</option>
      </select>

      <button onclick="applyFilters()">Search</button>
    </div>

    <div class="grid" id="news"></div>
  </div>

  <div class="sidebar">
    <div class="sideAd" id="adsBox">Ad</div>
  </div>

</div>

<script>
// ===== TOP AD =====
function closeAd(){document.getElementById("topAd").style.display="none";}
setTimeout(()=>{closeAd()},2000);

fetch("/ads")
.then(r=>r.json())
.then(ad=>{
  if(ad.image) document.getElementById("adImage").src=ad.image;
});

// ===== NEWS =====
let original=[],filtered=[];

fetch("articles.json?v="+Date.now())
.then(r=>r.json())
.then(d=>{
  original=d.articles||[];
  filtered=[...original];
  render();
});

function render(){
  const box=document.getElementById("news");
  box.innerHTML="";

  filtered.slice(0,20).forEach((a,i)=>{

    // INLINE AD LIKE REF
    if(i===4){
      box.innerHTML+=`
      <div class="adInline">
        <p style="font-size:12px;color:#999">ADVERTISEMENT</p>
        <img src="https://picsum.photos/600/200">
        <br><br>
        <button style="background:#e11d48;color:#fff;border:none;padding:8px 12px;border-radius:6px">
          Advertise Now
        </button>
      </div>`;
    }

    const card=document.createElement("div");
    card.className="card";

    card.innerHTML=`
      <img src="${a.image || 'https://picsum.photos/400'}">
      <div class="cardBody">
        <span class="badge">${a.category || 'General'}</span>
        <h3>${a.title_en || 'No title'}</h3>
        <p>${(a.summary_points||[]).join(" • ")}</p>
      </div>
    `;

    card.onclick=()=>{
      localStorage.setItem("currentArticle",JSON.stringify({
        title:a.title_en,
        summary:(a.summary_points||[]).join(" • "),
        article:a.article_en,
        image:a.image,
        timeline:a.timeline,
        vocab:a.vocab_en
      }));
      location.href="article.html";
    };

    box.appendChild(card);
  });
}

// ===== FILTER =====
function applyFilters(){
  const cat=document.getElementById("categoryFilter").value;
  filtered=original.filter(a=>{
    if(cat && a.category!==cat) return false;
    return true;
  });
  render();
}
</script>

</body>
</html>
