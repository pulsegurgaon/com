<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<style>
body{margin:0;font-family:Arial;background:#f4f4f6}

header{
padding:15px;background:#111;color:white;
display:flex;justify-content:space-between
}

.container{
padding:15px;max-width:900px;margin:auto
}

.card{
background:white;padding:15px;border-radius:10px;margin-bottom:20px
}

input,textarea{
width:100%;padding:10px;margin:8px 0;
border:1px solid #ddd;border-radius:6px
}

button{
padding:10px;border:none;border-radius:6px;
background:#e11d48;color:white;cursor:pointer
}

.hidden{display:none}
</style>
</head>

<body>

<header>
  <div>⚙️ PulseGurgaon Admin</div>
</header>

<div class="container">

<div id="loginBox" class="card">
  <h3>Login</h3>
  <input type="password" id="password" placeholder="Enter password">
  <button onclick="login()">Login</button>
</div>

<div id="dashboard" class="hidden">

  <div class="card">
    <h3>Add Blog</h3>
    <input id="blogTitle" placeholder="Title">
    <textarea id="blogContent" placeholder="Content"></textarea>
    <input id="blogImage" placeholder="Image URL">
    <button onclick="addBlog()">Publish Blog</button>
  </div>

  <div class="card">
    <h3>Breaking Ticker</h3>
    <input id="tickerInput" placeholder="Ticker text">
    <button onclick="saveTicker()">Save</button>
  </div>

  <div class="card">
    <h3>Ads</h3>
    <input id="adText" placeholder="Ad text">
    <input id="adLink" placeholder="Ad link">
    <button onclick="saveAds()">Save</button>
  </div>

</div>

</div>

<script>

function login(){
  fetch("/admin",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({
      password:document.getElementById("password").value
    })
  })
  .then(r=>r.json())
  .then(d=>{
    if(d.success){
      document.getElementById("loginBox").style.display="none";
      document.getElementById("dashboard").classList.remove("hidden");
    }else{
      alert("Wrong password");
    }
  });
}

function addBlog(){
  fetch("/save-blog",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({
      title:blogTitle.value,
      content:blogContent.value,
      image:blogImage.value
    })
  });
  alert("Blog added");
}

function saveTicker(){
  fetch("/save-ticker",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({
      text:tickerInput.value
    })
  });
  alert("Ticker updated");
}

function saveAds(){
  fetch("/save-ads",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({
      text:adText.value,
      link:adLink.value
    })
  });
  alert("Ads updated");
}

</script>

</body>
</html>
