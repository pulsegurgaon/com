<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<style>
body{
font-family:Arial;
background:#111;
color:white;
margin:0;
padding:20px;
}

h2{margin-top:30px}

input,textarea,button{
width:100%;
margin:8px 0;
padding:10px;
border:none;
border-radius:6px;
}

button{
background:#e11d48;
color:white;
cursor:pointer;
}

.card{
background:#222;
padding:10px;
margin:10px 0;
border-radius:8px;
}
</style>
</head>

<body>

<h1>⚙️ Admin Panel</h1>

<!-- LOGIN -->
<div id="loginBox">
<input type="password" id="pass" placeholder="Enter password">
<button onclick="login()">Login</button>
</div>

<div id="panel" style="display:none;">

<!-- TICKER -->
<h2>🧵 Update Ticker</h2>
<input id="tickerInput" placeholder="Enter ticker text">
<button onclick="saveTicker()">Save Ticker</button>

<!-- ADS -->
<h2>📢 Add Ad</h2>
<input id="adText" placeholder="Ad Text">
<input id="adLink" placeholder="Ad Link">
<input id="adImage" placeholder="Image URL">
<input id="adDuration" placeholder="Duration (ms)">
<button onclick="saveAd()">Add Ad</button>

<!-- BLOG -->
<h2>✍️ Add Blog</h2>
<input id="blogTitle" placeholder="Title">
<textarea id="blogContent" placeholder="Content"></textarea>
<button onclick="addBlog()">Add Blog</button>

<h2>📚 Blogs</h2>
<div id="blogs"></div>

<!-- ARTICLES -->
<h2>📰 Articles</h2>
<div id="articles"></div>

</div>

<script>

// LOGIN
function login(){
fetch("/admin",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({password:pass.value})
})
.then(r=>r.json())
.then(d=>{
if(d.success){
loginBox.style.display="none";
panel.style.display="block";
loadData();
}else{
alert("Wrong password");
}
});
}

// LOAD DATA
function loadData(){

// BLOGS
fetch("/blogs")
.then(r=>r.json())
.then(data=>{
blogs.innerHTML="";
data.forEach(b=>{
blogs.innerHTML+=`
<div class="card">
<b>${b.title}</b>
<button onclick="deleteBlog(${b.id})">Delete</button>
</div>`;
});
});

// ARTICLES
fetch("/news")
.then(r=>r.json())
.then(data=>{
articles.innerHTML="";
data.slice(0,20).forEach(a=>{
articles.innerHTML+=`
<div class="card">
<b>${a.title_en}</b>
<button onclick="deleteArticle(${a.id})">Delete</button>
</div>`;
});
});

}

// DELETE BLOG
function deleteBlog(id){
fetch("/delete-blog",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({id})
}).then(()=>loadData());
}

// DELETE ARTICLE
function deleteArticle(id){
fetch("/delete-article",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({id})
}).then(()=>loadData());
}

// ADD BLOG
function addBlog(){
fetch("/add-blog",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({
title:blogTitle.value,
content:blogContent.value
})
}).then(()=>{
alert("Blog added");
loadData();
});
}

// SAVE TICKER
function saveTicker(){
fetch("/set-ticker",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({text:tickerInput.value})
}).then(()=>alert("Ticker updated"));
}

// SAVE AD
function saveAd(){
fetch("/save-ads",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({
text:adText.value,
link:adLink.value,
image:adImage.value,
duration:Number(adDuration.value)
})
}).then(()=>alert("Ad added"));
}

</script>

</body>
</html>
